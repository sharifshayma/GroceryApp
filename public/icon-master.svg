<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bagGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5A04A"/>
      <stop offset="100%" stop-color="#F28B30"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9ED05A"/>
      <stop offset="100%" stop-color="#8BC34A"/>
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#8BC34A"/>
      <stop offset="100%" stop-color="#6DA83A"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#3D2E1E" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="bagTopGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8611A"/>
      <stop offset="100%" stop-color="#F28B30"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="#FFF8E7"/>

  <!-- All icon content - centered -->
  <g transform="translate(480, 510) scale(0.78)">
    <!-- Shopping bag -->
    <g filter="url(#shadow)" transform="translate(0, 50)">
      <path d="M-190 -85 L-172 270 C-168 298 -146 318 -118 318 L118 318 C146 318 168 298 172 270 L190 -85 C192 -103 178 -118 158 -118 L-158 -118 C-178 -118 -192 -103 -190 -85Z" fill="url(#bagGrad)"/>
      <path d="M-180 -85 L-158 -118 L158 -118 L180 -85 Z" fill="url(#bagTopGrad)" opacity="0.35"/>
      <path d="M-75 -118 L-75 -195 C-75 -242 -45 -278 0 -278 C45 -278 75 -242 75 -195 L75 -118" fill="none" stroke="#E8611A" stroke-width="28" stroke-linecap="round"/>
      <rect x="-148" y="50" width="296" height="5" rx="2.5" fill="#E8611A" opacity="0.16"/>
      <rect x="-148" y="72" width="296" height="4" rx="2" fill="#E8611A" opacity="0.09"/>
      <!-- Subtle fruit peek -->
      <circle cx="-48" cy="-32" r="28" fill="#E8C840" opacity="0.20"/>
      <circle cx="55" cy="-20" r="20" fill="#8BC34A" opacity="0.15"/>
    </g>

    <!-- Green leaves -->
    <g transform="translate(0, -240)">
      <!-- Main leaf -->
      <path d="M0 35 C-38 -30 -20 -115 24 -155 C48 -115 38 -30 0 35Z" fill="url(#leafGrad)"/>
      <path d="M9 5 C7 -42 15 -90 22 -140" fill="none" stroke="#5A9E3E" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
      <!-- Second leaf -->
      <path d="M5 25 C34 -18 72 -55 108 -75 C84 -38 45 -2 5 25Z" fill="url(#leafGrad2)" opacity="0.8"/>
      <path d="M20 8 C44 -14 66 -34 96 -62" fill="none" stroke="#5A9E3E" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    </g>

    <!-- Golden sparkles -->
    <g transform="translate(148, -275)">
      <path d="M0 -26 L7 -7 L26 0 L7 7 L0 26 L-7 7 L-26 0 L-7 -7 Z" fill="#E8C840"/>
    </g>
    <g transform="translate(188, -220)">
      <path d="M0 -14 L4 -4 L14 0 L4 4 L0 14 L-4 4 L-14 0 L-4 -4 Z" fill="#F2E085"/>
    </g>
    <g transform="translate(132, -210)">
      <circle r="5" fill="#E8C840" opacity="0.5"/>
    </g>
  </g>
</svg>
